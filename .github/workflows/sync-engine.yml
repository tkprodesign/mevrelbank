name: GitHub Sync Engine v1

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Synchronize current branch to configured target
    runs-on: ubuntu-latest

    # First loop-prevention gate: never run for pushes authored by GitHub Actions
    # and allow humans/operators to opt out with a commit message marker.
    if: >-
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message || '', '[skip-sync]') &&
      !contains(github.event.head_commit.message || '', '[sync skip]')

    steps:
      - name: Checkout source repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Load sync configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_FILE=".github/sync-config.json"

          if [[ ! -f "${CONFIG_FILE}" ]]; then
            echo "Sync configuration file not found: ${CONFIG_FILE}" >&2
            exit 1
          fi

          target_owner="$(jq -r '.targetOwner // empty' "${CONFIG_FILE}")"
          target_repo="$(jq -r '.targetRepo // empty' "${CONFIG_FILE}")"
          default_branch="$(jq -r '.defaultBranch // empty' "${CONFIG_FILE}")"

          if [[ -z "${target_owner}" || -z "${target_repo}" || -z "${default_branch}" ]]; then
            echo "sync-config.json must define targetOwner, targetRepo, and defaultBranch." >&2
            exit 1
          fi

          echo "target-owner=${target_owner}" >> "${GITHUB_OUTPUT}"
          echo "target-repo=${target_repo}" >> "${GITHUB_OUTPUT}"
          echo "default-branch=${default_branch}" >> "${GITHUB_OUTPUT}"
          echo "target-slug=${target_owner}/${target_repo}" >> "${GITHUB_OUTPUT}"

      - name: Determine source branch and commit
        id: source
        shell: bash
        run: |
          set -euo pipefail

          # github.ref_name is the safest branch source for push/workflow_dispatch.
          # Fall back to the configured default branch if ref_name is unavailable.
          branch="${GITHUB_REF_NAME:-${{ steps.config.outputs.default-branch }}}"
          sha="$(git rev-parse HEAD)"

          if [[ -z "${branch}" || -z "${sha}" ]]; then
            echo "Unable to determine source branch or commit SHA." >&2
            exit 1
          fi

          echo "branch=${branch}" >> "${GITHUB_OUTPUT}"
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"
          echo "Repository : ${GITHUB_REPOSITORY}"
          echo "Branch     : ${branch}"
          echo "Current SHA: ${sha}"

      - name: Clone target repository
        id: target
        shell: bash
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
          TARGET_SLUG: ${{ steps.config.outputs.target-slug }}
          BRANCH: ${{ steps.source.outputs.branch }}
        run: |
          set -euo pipefail

          if [[ -z "${SYNC_PAT}" ]]; then
            echo "SYNC_PAT secret is required for GitHub Sync Engine pushes." >&2
            exit 1
          fi

          target_dir="$(mktemp -d)"
          target_url="https://x-access-token:${SYNC_PAT}@github.com/${TARGET_SLUG}.git"

          # Clone complete target history so SHA comparison and branch checks are reliable.
          git clone --quiet --no-tags "${target_url}" "${target_dir}"

          cd "${target_dir}"
          git fetch --quiet origin "+refs/heads/*:refs/remotes/origin/*"

          if git rev-parse --verify --quiet "origin/${BRANCH}" >/dev/null; then
            target_sha="$(git rev-parse "origin/${BRANCH}")"
            target_branch_exists="true"
          else
            target_sha=""
            target_branch_exists="false"
          fi

          echo "target-dir=${target_dir}" >> "${GITHUB_OUTPUT}"
          echo "target-sha=${target_sha}" >> "${GITHUB_OUTPUT}"
          echo "target-branch-exists=${target_branch_exists}" >> "${GITHUB_OUTPUT}"
          echo "Target repo : ${TARGET_SLUG}"
          echo "Target SHA  : ${target_sha:-<branch does not exist>}"

      - name: Decide whether synchronization is required
        id: decision
        shell: bash
        env:
          CURRENT_SHA: ${{ steps.source.outputs.sha }}
          TARGET_SHA: ${{ steps.target.outputs.target-sha }}
          TARGET_BRANCH_EXISTS: ${{ steps.target.outputs.target-branch-exists }}
        run: |
          set -euo pipefail

          if [[ "${TARGET_BRANCH_EXISTS}" == "true" && "${CURRENT_SHA}" == "${TARGET_SHA}" ]]; then
            echo "should-sync=false" >> "${GITHUB_OUTPUT}"
            echo "reason=Source and target already contain the same HEAD commit." >> "${GITHUB_OUTPUT}"
            echo "Sync occurred: no"
            echo "Reason       : Source and target already contain the same HEAD commit."
          else
            echo "should-sync=true" >> "${GITHUB_OUTPUT}"
            if [[ "${TARGET_BRANCH_EXISTS}" == "true" ]]; then
              echo "reason=Source and target branch HEAD commits differ." >> "${GITHUB_OUTPUT}"
              echo "Reason       : Source and target branch HEAD commits differ."
            else
              echo "reason=Target branch does not exist and will be created." >> "${GITHUB_OUTPUT}"
              echo "Reason       : Target branch does not exist and will be created."
            fi
            echo "Sync occurred: pending"
          fi

      - name: Push current branch to target repository
        if: steps.decision.outputs.should-sync == 'true'
        shell: bash
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
          BRANCH: ${{ steps.source.outputs.branch }}
          CURRENT_SHA: ${{ steps.source.outputs.sha }}
          TARGET_SLUG: ${{ steps.config.outputs.target-slug }}
        run: |
          set -euo pipefail

          cd "${GITHUB_WORKSPACE}"
          target_url="https://x-access-token:${SYNC_PAT}@github.com/${TARGET_SLUG}.git"

          # Push only the current branch. Tags and other branches are intentionally excluded.
          git push "${target_url}" "HEAD:refs/heads/${BRANCH}"

          echo "Repository  : ${GITHUB_REPOSITORY}"
          echo "Target repo : ${TARGET_SLUG}"
          echo "Branch      : ${BRANCH}"
          echo "Pushed SHA  : ${CURRENT_SHA}"
          echo "Sync occurred: yes"

      - name: Final sync summary
        if: always()
        shell: bash
        env:
          TARGET_SLUG: ${{ steps.config.outputs.target-slug }}
          BRANCH: ${{ steps.source.outputs.branch }}
          CURRENT_SHA: ${{ steps.source.outputs.sha }}
          TARGET_SHA: ${{ steps.target.outputs.target-sha }}
          SHOULD_SYNC: ${{ steps.decision.outputs.should-sync }}
          SKIP_REASON: ${{ steps.decision.outputs.reason }}
        run: |
          set -euo pipefail

          echo "Repository : ${GITHUB_REPOSITORY}"
          echo "Target     : ${TARGET_SLUG:-unknown}"
          echo "Branch     : ${BRANCH:-unknown}"
          echo "Current SHA: ${CURRENT_SHA:-unknown}"
          echo "Target SHA : ${TARGET_SHA:-<branch missing or unavailable>}"

          if [[ "${SHOULD_SYNC:-false}" == "true" ]]; then
            echo "Sync occurred: yes"
          else
            echo "Sync occurred: no"
            echo "Reason       : ${SKIP_REASON:-Workflow skipped by guard, failed before decision, or no sync required.}"
          fi
# Minimum permissions required; write needed only to satisfy checkout
permissions:
  contents: write

jobs:
  sync:
    name: Synchronize to target repository
    runs-on: ubuntu-latest

    # ── Loop prevention layer 1 ──────────────────────────────────────────────
    # Drop any push that was made by the GitHub Actions bot itself.
    # This prevents the target repo's sync-back from re-triggering us.
    if: github.actor != 'github-actions[bot]'

    steps:

      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout source repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed for accurate pushes

      # ── 2. Read configuration ────────────────────────────────────────────────
      # All target values come from .github/sync-config.json — nothing is
      # hard-coded in this workflow file.
      - name: Read sync configuration
        id: config
        run: |
          set -euo pipefail
          CONFIG=".github/sync-config.json"
          TARGET_OWNER=$(jq -r '.targetOwner'   "$CONFIG")
          TARGET_REPO=$(jq -r  '.targetRepo'    "$CONFIG")
          DEFAULT_BRANCH=$(jq -r '.defaultBranch' "$CONFIG")
          echo "target_owner=${TARGET_OWNER}"               >> "$GITHUB_OUTPUT"
          echo "target_repo=${TARGET_REPO}"                 >> "$GITHUB_OUTPUT"
          echo "default_branch=${DEFAULT_BRANCH}"           >> "$GITHUB_OUTPUT"
          echo "target_full=${TARGET_OWNER}/${TARGET_REPO}" >> "$GITHUB_OUTPUT"

      # ── 3. Commit-message skip marker ────────────────────────────────────────
      # Any commit whose message includes "[skip sync]" is honoured as a
      # manual bypass without aborting the workflow.  workflow_dispatch runs
      # never carry a commit message and therefore always proceed.
      - name: Check for skip marker in commit message
        id: skip_check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          if [[ "${COMMIT_MSG:-}" == *"[skip sync]"* ]]; then
            echo "skip=true"                                              >> "$GITHUB_OUTPUT"
            echo "skip_reason=Commit message contains [skip sync] marker" >> "$GITHUB_OUTPUT"
            echo "---  Skip Marker Detected  ---"
            echo "  Reason : [skip sync] found in commit message"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 4. Log source metadata ───────────────────────────────────────────────
      - name: Capture source repository metadata
        if: steps.skip_check.outputs.skip != 'true'
        id: source
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          SHA="${GITHUB_SHA}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}"       >> "$GITHUB_OUTPUT"
          echo "---  Source Repository  ---"
          echo "  Repo   : ${GITHUB_REPOSITORY}"
          echo "  Branch : ${BRANCH}"
          echo "  SHA    : ${SHA}"
          echo "  Actor  : ${GITHUB_ACTOR}"

      # ── 5. Retrieve target SHA ───────────────────────────────────────────────
      # Uses git ls-remote — avoids cloning the entire target repository just
      # to read its HEAD SHA.
      - name: Retrieve target repository HEAD SHA
        if: steps.skip_check.outputs.skip != 'true'
        id: target
        env:
          SYNC_PAT:    ${{ secrets.SYNC_PAT }}
          TARGET_FULL: ${{ steps.config.outputs.target_full }}
          BRANCH:      ${{ steps.source.outputs.branch }}
        run: |
          set -euo pipefail
          TARGET_URL="https://x-access-token:${SYNC_PAT}@github.com/${TARGET_FULL}.git"

          # ls-remote returns an empty string when the branch does not yet exist
          TARGET_SHA=$(git ls-remote "${TARGET_URL}" "refs/heads/${BRANCH}" 2>/dev/null \
                       | awk '{print $1}')

          echo "---  Target Repository  ---"
          echo "  Repo   : ${TARGET_FULL}"
          echo "  Branch : ${BRANCH}"

          if [[ -z "${TARGET_SHA}" ]]; then
            echo "  SHA    : <branch does not exist — will be created>"
            echo "target_sha="                >> "$GITHUB_OUTPUT"
            echo "branch_exists=false"        >> "$GITHUB_OUTPUT"
          else
            echo "  SHA    : ${TARGET_SHA}"
            echo "target_sha=${TARGET_SHA}"   >> "$GITHUB_OUTPUT"
            echo "branch_exists=true"         >> "$GITHUB_OUTPUT"
          fi

      # ── 6. SHA comparison ────────────────────────────────────────────────────
      # Loop prevention layer 2: when both sides share the same commit the
      # push step is skipped, so no redundant network traffic and no spurious
      # trigger on the target side.
      - name: Compare SHAs and determine sync action
        if: steps.skip_check.outputs.skip != 'true'
        id: decision
        env:
          SOURCE_SHA:    ${{ steps.source.outputs.sha }}
          TARGET_SHA:    ${{ steps.target.outputs.target_sha }}
          BRANCH_EXISTS: ${{ steps.target.outputs.branch_exists }}
        run: |
          set -euo pipefail
          echo "---  SHA Comparison  ---"
          echo "  Source SHA : ${SOURCE_SHA}"
          echo "  Target SHA : ${TARGET_SHA:-<not present>}"

          if [[ "${BRANCH_EXISTS}" == "true" && "${SOURCE_SHA}" == "${TARGET_SHA}" ]]; then
            echo "sync_needed=false" >> "$GITHUB_OUTPUT"
            echo "  Decision   : SKIP — already in sync"
          else
            echo "sync_needed=true"  >> "$GITHUB_OUTPUT"
            echo "  Decision   : SYNC — push required"
          fi

      # ── 7. Log when sync is skipped ──────────────────────────────────────────
      - name: Log sync skipped reason
        if: >
          steps.skip_check.outputs.skip != 'true' &&
          steps.decision.outputs.sync_needed == 'false'
        env:
          SOURCE_SHA:  ${{ steps.source.outputs.sha }}
          TARGET_FULL: ${{ steps.config.outputs.target_full }}
          BRANCH:      ${{ steps.source.outputs.branch }}
        run: |
          echo "---  Sync Skipped  ---"
          echo "  Reason : Source and target already share commit ${SOURCE_SHA}"
          echo "  Target : ${TARGET_FULL}:${BRANCH}"

      # ── 8. Push to target ────────────────────────────────────────────────────
      # Only the current branch is pushed — no other refs are touched.
      # --force is intentional: this (primary) repository is authoritative.
      - name: Push branch to target repository
        if: >
          steps.skip_check.outputs.skip != 'true' &&
          steps.decision.outputs.sync_needed == 'true'
        env:
          SYNC_PAT:    ${{ secrets.SYNC_PAT }}
          TARGET_FULL: ${{ steps.config.outputs.target_full }}
          BRANCH:      ${{ steps.source.outputs.branch }}
          SOURCE_SHA:  ${{ steps.source.outputs.sha }}
        run: |
          set -euo pipefail

          # Use the bot identity for git operations
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TARGET_URL="https://x-access-token:${SYNC_PAT}@github.com/${TARGET_FULL}.git"
          git remote add target "${TARGET_URL}"

          # Push only the current branch; --force makes the target mirror the
          # source exactly (primary repository wins on divergence).
          git push target "HEAD:refs/heads/${BRANCH}" --force

          echo "---  Sync Complete  ---"
          echo "  Pushed : ${SOURCE_SHA}"
          echo "  To     : ${TARGET_FULL}:${BRANCH}"
