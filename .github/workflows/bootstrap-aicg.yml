name: Bootstrap AI Context Gateway

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate AI Context Gateway
        shell: bash
        run: |

          mkdir -p aicg/{sessions,logs}

          touch aicg/server.js
          touch aicg/config.js
          touch aicg/auth.js
          touch aicg/session.js
          touch aicg/github.js
          touch aicg/search.js
          touch aicg/read.js
          touch aicg/tree.js
          touch aicg/logger.js

          cat > aicg/package.json << 'EOF'
          {
            "name": "aicg",
            "version": "0.1.0",
            "private": true,
            "main": "server.js",
            "scripts": {
              "start": "node server.js"
            },
            "dependencies": {
              "@octokit/rest": "^22.0.0",
              "bcrypt": "^6.0.0",
              "dotenv": "^17.2.1",
              "express": "^5.1.0",
              "uuid": "^11.1.0"
            }
          }
          EOF

          cat > aicg/.env.example << 'EOF'
          G_TOKEN=
          SESSION_SECRET=
          EOF

          cat > aicg/sessions/active.json << 'EOF'
          {}
          EOF

          cat > aicg/logs/access.log << 'EOF'
          AI Context Gateway Log
          EOF

          cat > aicg/README.md << 'EOF'
          # AI Context Gateway (AICG)

          ## Status
          Bootstrap Complete

          ## Modules

          - server.js
          - config.js
          - auth.js
          - session.js
          - github.js
          - search.js
          - read.js
          - tree.js
          - logger.js

          ## Folders

          sessions/
          logs/

          Version 0.1.0
          EOF

      - name: Commit Bootstrap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "feat(aicg): bootstrap AI Context Gateway v0.1.0"

      - name: Push Changes
        run: git push
