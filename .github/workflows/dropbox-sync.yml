name: Dropbox Sync

on:
  push:
    branches:
      - main

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync Repository to Dropbox
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Dropbox Sync
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_ROOT_FOLDER: ${{ secrets.DROPBOX_ROOT_FOLDER }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: node .github/scripts/dropbox-sync.js

      - name: Print Summary
        if: always()
        run: echo "Dropbox sync complete. See logs above for the full summary."
